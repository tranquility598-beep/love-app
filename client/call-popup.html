<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Входящий звонок - Love</title>
  <style>
    :root {
      --bg: #111;
      --text: #fff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --green: #2ecc71;
      --red: #e74c3c;
      --accent: #fff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .call-card {
      width: 340px;
      height: 440px;
      background: var(--bg);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      -webkit-app-region: drag; /* Позволяет перетаскивать окно */
    }

    .avatar-view {
      position: relative;
      width: 140px;
      height: 140px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    .avatar-wrapper {
      position: relative;
      z-index: 2;
      border-radius: 50%;
      overflow: hidden;
      width: 120px;
      height: 120px;
      border: 4px solid var(--bg);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Пульсирующие волны */
    .waves {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      z-index: 1;
    }

    .wave {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      opacity: 0;
      animation: ripple 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    .wave:nth-child(2) { animation-delay: 0.6s; }
    .wave:nth-child(3) { animation-delay: 1.2s; }

    @keyframes ripple {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .caller-info {
      text-align: center;
      margin-top: 30px;
      flex: 1;
      -webkit-app-region: no-drag;
    }

    .caller-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .call-status {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .actions {
      display: flex;
      gap: 30px;
      margin-top: 20px;
      -webkit-app-region: no-drag;
    }

    .btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn:hover {
      transform: scale(1.1);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-decline {
      background: var(--red);
      color: white;
      box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
    }

    .btn-accept {
      background: var(--green);
      color: white;
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
    }

    .btn svg {
      width: 28px;
      height: 28px;
    }

    /* Анимация при отклонении */
    .shrinking {
      animation: shrinkOut 0.5s forwards cubic-bezier(0.6, -0.28, 0.735, 0.045);
    }

    @keyframes shrinkOut {
      to { transform: scale(0); opacity: 0; }
    }

    /* Визуальный эффект Бульк */
    .bulk-ripple {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .bulk-animate {
      animation: bulkScale 0.6s ease-out forwards;
    }

    @keyframes bulkScale {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="call-card" id="call-card">
    <div class="avatar-view">
      <div class="avatar-wrapper" id="avatar-container">
        <img src="" alt="" class="avatar-img" id="caller-avatar">
        <div class="bulk-ripple" id="bulk-ripple"></div>
      </div>
      <div class="waves">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
      </div>
    </div>

    <div class="caller-info">
      <div class="caller-name" id="caller-name">Пользователь</div>
      <div class="call-status">Входящий звонок</div>
    </div>

    <div class="actions">
      <button class="btn btn-decline" id="btn-decline" title="Отклонить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6c1.02.7 2.01 1 3 1 .98 0 1.81-.45 2.5-1.1s1.1-1.6 1.1-2.5c0-.85-.22-1.5-.67-1.93a20.21 20.21 0 0 0-3.3-2.61 2.45 2.45 0 0 0-2.43 0L12 10.12l-1.39-1.25a2.45 2.45 0 0 0-2.43 0 20.21 20.21 0 0 0-3.3 2.61c-.45.43-.67 1.08-.67 1.93 0 .9.41 1.85 1.1 2.5s1.52 1.1 2.5 1.1c.99 0 1.98-.3 3-1a16 16 0 0 0 3.41-2.6L12 11.2l-1.32 2.11z"/>
          <line x1="23" y1="1" x2="1" y2="23" stroke="white" stroke-width="3"></line>
        </svg>
      </button>
      <button class="btn btn-accept" id="btn-accept" title="Принять">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
      </button>
    </div>
  </div>

  <script src="js/call-popup.js"></script>
</body>
</html>
